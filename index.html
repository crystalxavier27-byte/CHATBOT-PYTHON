<!DOCTYPE html>
<html>

<head>

<title>CloudOps Assistant</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef1f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat-container{
width:450px;
height:600px;
background:white;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

.chatbox{
flex:1;
padding:15px;
overflow-y:auto;
background:#f9fafc;
}

.message{
margin:10px 0;
display:flex;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
padding:10px 15px;
border-radius:15px;
max-width:70%;
}

.user .bubble{
background:#007bff;
color:white;
}

.bot .bubble{
background:#e4e6eb;
color:black;
}

.input-area{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
}

button{
padding:12px 20px;
border:none;
background:#007bff;
color:white;
cursor:pointer;
}

.typing{
font-style:italic;
color:gray;
margin-top:5px;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
CloudOps Assistant 🤖
</div>

<div class="chatbox" id="chatbox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask about DevOps...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const input=document.getElementById("userInput")

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage()
}
})

async function sendMessage(){

const userText=input.value.trim()

if(userText==="") return

const chatbox=document.getElementById("chatbox")

chatbox.innerHTML+=`
<div class="message user">
<div class="bubble">${userText}</div>
</div>
`

input.value=""

chatbox.innerHTML+=`
<div class="message bot" id="typing">
<div class="bubble typing">Bot is typing...</div>
</div>
`

chatbox.scrollTop=chatbox.scrollHeight

const response=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:userText})
})

const data=await response.json()

document.getElementById("typing").remove()

chatbox.innerHTML+=`
<div class="message bot">
<div class="bubble">${data.reply}</div>
</div>
`

chatbox.scrollTop=chatbox.scrollHeight

}

</script>

</body>

</html>
